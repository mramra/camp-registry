<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إدارة المستخدمين — سجل المخيم</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Cairo, sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; padding: 20px; direction: rtl; }
    h1 { color: #f59e0b; font-size: 20px; margin-bottom: 20px; text-align: center; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .card-title { font-size: 14px; font-weight: 700; color: #f59e0b; margin-bottom: 12px; }
    label { font-size: 12px; color: #8b949e; display: block; margin-bottom: 4px; margin-top: 10px; }
    input, select { width: 100%; background: #21262d; border: 1px solid #30363d; border-radius: 8px; padding: 10px 12px; color: #e6edf3; font-family: Cairo, sans-serif; font-size: 13px; outline: none; }
    input:focus, select:focus { border-color: #f59e0b; }
    .btn { width: 100%; background: #f59e0b; color: #000; border: none; border-radius: 8px; padding: 12px; font-family: Cairo, sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 12px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-red { background: rgba(239,68,68,0.1); border: 1px solid #ef4444; color: #ef4444; }
    .btn-blue { background: rgba(59,130,246,0.1); border: 1px solid #3b82f6; color: #3b82f6; }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1f2937; border: 1px solid #f59e0b; border-radius: 10px; padding: 12px 20px; font-size: 13px; z-index: 9999; display: none; min-width: 200px; text-align: center; }
    .toast.err { border-color: #ef4444; color: #ef4444; }
    .err-msg { color: #ef4444; font-size: 12px; margin-top: 8px; display: none; }
    .user-item { border: 1px solid #30363d; border-radius: 10px; padding: 12px; margin-bottom: 10px; }
    .user-name { font-size: 14px; font-weight: 700; }
    .user-info { font-size: 11px; color: #8b949e; margin-top: 3px; }
    .user-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .user-actions button { background: transparent; border: 1px solid #30363d; color: #e6edf3; border-radius: 6px; padding: 5px 12px; font-family: Cairo, sans-serif; font-size: 11px; font-weight: 700; cursor: pointer; }
    .badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; margin-bottom: 4px; }
    .badge-admin { background: rgba(245,158,11,0.15); color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); }
    .badge-owner { background: rgba(139,92,246,0.15); color: #a78bfa; border: 1px solid rgba(139,92,246,0.3); }
  </style>
</head>
<body>
  <h1>⚙️ إدارة المستخدمين</h1>

  <!-- تسجيل دخول المدير -->
  <div id="loginSection" class="card">
    <div class="card-title">🔐 تسجيل الدخول</div>
    <label>رقم الهوية</label>
    <input type="text" id="adminId" placeholder="412617003">
    <label>كلمة المرور</label>
    <input type="password" id="adminPass" placeholder="كلمة المرور">
    <div class="err-msg" id="loginErr"></div>
    <button class="btn" onclick="doLogin()">دخول</button>
  </div>

  <!-- القسم الرئيسي -->
  <div id="mainSection" style="display:none">

    <!-- إنشاء مستخدم جديد -->
    <div class="card">
      <div class="card-title">➕ إنشاء مستخدم جديد</div>
      <label>الاسم الكامل *</label>
      <input type="text" id="newName" placeholder="محمد أحمد علي محمود">
      <label>رقم الهوية *</label>
      <input type="text" id="newId" placeholder="412345678" maxlength="9" inputmode="numeric">
      <label>رقم الجوال * (كلمة المرور الأولى)</label>
      <input type="text" id="newPhone" placeholder="0501234567" maxlength="10" inputmode="numeric">
      <label>الدور</label>
      <select id="newRole">
        <option value="super_admin">مدير الإيواء</option>
        <option value="camp_delegate">مندوب مخيم</option>
        <option value="assistant">مساعد</option>
      </select>
      <label>المخيم (للمندوب والمساعد)</label>
      <select id="newCamp">
        <option value="">-- اختر المخيم --</option>
      </select>
      <div class="err-msg" id="createErr"></div>
      <button class="btn" id="btnCreate" onclick="createUser()">💾 إنشاء المستخدم</button>
    </div>

    <!-- إعادة كلمة مرور -->
    <div class="card">
      <div class="card-title">🔑 إعادة كلمة مرور</div>
      <label>user_id (من قاعدة البيانات)</label>
      <input type="text" id="resetUserId" placeholder="uuid...">
      <label>كلمة المرور الجديدة</label>
      <input type="text" id="resetPass" placeholder="رقم الجوال أو كلمة مرور جديدة">
      <div class="err-msg" id="resetErr"></div>
      <button class="btn btn-blue" onclick="resetPassword()">🔑 تغيير كلمة المرور</button>
    </div>

    <!-- قائمة المستخدمين -->
    <div class="card">
      <div class="card-title">👥 المستخدمون الحاليون</div>
      <div id="usersList">جارٍ التحميل...</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://ojclpkenecicujkqhhlu.supabase.co'
    const ANON_KEY     = 'sb_publishable_d6q8hoDDcohuZFHk3jxI7g_IBWWCmNu'
    const SERVICE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9qY2xwa2VuZWNpY3Vqa3FoaGx1Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NDIxMTMzMSwiZXhwIjoyMDg5Nzg3MzMxfQ.nm_rtTCvdxTiMc9ciyapgEq2c5k6pcMVFc_F-tN6_ro'
    const ORG_ID       = 'ddc8abe7-518f-40a4-8c3b-ee03bb0f47d5'

    const { createClient } = supabase
    const db = createClient(SUPABASE_URL, ANON_KEY)

    function showToast(msg, err=false) {
      const t = document.getElementById('toast')
      t.textContent = msg
      t.className = 'toast' + (err?' err':'')
      t.style.display = 'block'
      setTimeout(() => t.style.display='none', 3000)
    }

    async function doLogin() {
      const id   = document.getElementById('adminId').value.trim()
      const pass = document.getElementById('adminPass').value
      const err  = document.getElementById('loginErr')
      err.style.display = 'none'
      if (!id || !pass) { err.textContent='أدخل رقم الهوية وكلمة المرور'; err.style.display='block'; return }

      const { data, error } = await db.auth.signInWithPassword({ email: id+'@c.co', password: pass })
      if (error) { err.textContent='خطأ: '+error.message; err.style.display='block'; return }

      // تحقق أنه platform_owner
      const { data: member } = await db.from('org_members').select('role').eq('user_id', data.user.id).single()
      if (member?.role !== 'platform_owner') {
        err.textContent='هذه الصفحة للمالك فقط'
        err.style.display='block'
        await db.auth.signOut()
        return
      }

      document.getElementById('loginSection').style.display = 'none'
      document.getElementById('mainSection').style.display = 'block'
      loadCamps()
      loadUsers()
    }

    async function loadCamps() {
      const { data } = await db.from('camps').select('id,name').eq('org_id', ORG_ID).eq('status','active')
      const sel = document.getElementById('newCamp')
      sel.innerHTML = '<option value="">-- اختر المخيم --</option>'
      data?.forEach(c => sel.innerHTML += `<option value="${c.id}">${c.name}</option>`)
    }

    async function createUser() {
      const name   = document.getElementById('newName').value.trim()
      const natId  = document.getElementById('newId').value.trim()
      const phone  = document.getElementById('newPhone').value.trim()
      const role   = document.getElementById('newRole').value
      const campId = document.getElementById('newCamp').value
      const err    = document.getElementById('createErr')
      const btn    = document.getElementById('btnCreate')
      err.style.display = 'none'

      if (!name)  { err.textContent='أدخل الاسم'; err.style.display='block'; return }
      if (natId.length < 9) { err.textContent='رقم الهوية 9 أرقام'; err.style.display='block'; return }
      if (phone.length < 10) { err.textContent='رقم الجوال 10 أرقام'; err.style.display='block'; return }

      btn.disabled = true; btn.textContent = 'جارٍ الإنشاء...'

      try {
        // إنشاء المستخدم عبر Admin API
        const res = await fetch(`${SUPABASE_URL}/auth/v1/admin/users`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SERVICE_KEY,
            'Authorization': `Bearer ${SERVICE_KEY}`
          },
          body: JSON.stringify({
            email: natId + '@c.co',
            password: phone,
            email_confirm: true,
            user_metadata: { full_name: name }
          })
        })
        const json = await res.json()
        if (!res.ok) throw new Error(json.message || json.msg || 'فشل إنشاء الحساب')

        const userId = json.id
        // إضافة في org_members
        const { error: mErr } = await db.from('org_members').insert({
          org_id: ORG_ID, user_id: userId,
          camp_id: campId||null, role,
          full_name: name, phone, national_id: natId,
          must_change_pass: true,
          can_add: true, can_edit: true,
          can_delete: role==='camp_delegate',
          can_export: true, can_import: role==='camp_delegate',
          is_active: true,
        })
        if (mErr) throw mErr

        showToast(`✅ تم إنشاء ${name} — الدخول بـ ${phone}`)
        document.getElementById('newName').value = ''
        document.getElementById('newId').value = ''
        document.getElementById('newPhone').value = ''
        loadUsers()
      } catch(e) {
        err.textContent = 'خطأ: ' + e.message
        err.style.display = 'block'
      } finally {
        btn.disabled = false; btn.textContent = '💾 إنشاء المستخدم'
      }
    }

    async function resetPassword() {
      const uid  = document.getElementById('resetUserId').value.trim()
      const pass = document.getElementById('resetPass').value.trim()
      const err  = document.getElementById('resetErr')
      err.style.display = 'none'

      if (!uid || !pass) { err.textContent='أدخل user_id وكلمة المرور'; err.style.display='block'; return }
      if (pass.length < 6) { err.textContent='كلمة المرور 6 أحرف على الأقل'; err.style.display='block'; return }

      const res = await fetch(`${SUPABASE_URL}/auth/v1/admin/users/${uid}`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SERVICE_KEY,
          'Authorization': `Bearer ${SERVICE_KEY}`
        },
        body: JSON.stringify({ password: pass })
      })
      const json = await res.json()
      if (!res.ok) { err.textContent='خطأ: '+(json.message||json.msg||'فشل'); err.style.display='block'; return }
      showToast('✅ تم تغيير كلمة المرور')
      document.getElementById('resetUserId').value = ''
      document.getElementById('resetPass').value = ''
    }

    async function loadUsers() {
      const { data: users } = await db.from('org_members').select('*').eq('org_id', ORG_ID).order('created_at')
      const { data: camps } = await db.from('camps').select('id,name').eq('org_id', ORG_ID)
      const campMap = {}; camps?.forEach(c => campMap[c.id]=c.name)
      const roleNames = { platform_owner:'👑 مالك المنصة', super_admin:'🔴 مدير الإيواء', camp_delegate:'🟡 مندوب', assistant:'🟢 مساعد' }

      const list = document.getElementById('usersList')
      list.innerHTML = users?.map(u => `
        <div class="user-item">
          <div class="badge ${u.role==='platform_owner'?'badge-owner':'badge-admin'}">${roleNames[u.role]||u.role}</div>
          <div class="user-name">${u.full_name}</div>
          <div class="user-info">
            🪪 ${u.national_id||'—'} • 📱 ${u.phone||'—'}
            ${u.camp_id?` • ⛺ ${campMap[u.camp_id]||'—'}`:''}
          </div>
          <div class="user-info" style="font-size:10px;margin-top:3px;color:#555;">user_id: ${u.user_id}</div>
          <div class="user-actions">
            <button onclick="copyId('${u.user_id}')" style="color:#3b82f6;border-color:#3b82f6;">📋 نسخ user_id</button>
            <button onclick="quickReset('${u.user_id}','${u.phone||u.national_id}','${u.full_name}')" style="color:#f59e0b;border-color:#f59e0b;">🔑 إعادة كلمة المرور</button>
          </div>
        </div>`).join('') || 'لا يوجد مستخدمون'
    }

    function copyId(id) {
      navigator.clipboard.writeText(id).then(() => showToast('✅ تم نسخ user_id'))
        .catch(() => { 
          // fallback للجوال
          const el = document.createElement('textarea')
          el.value = id
          document.body.appendChild(el)
          el.select()
          document.execCommand('copy')
          document.body.removeChild(el)
          showToast('✅ تم نسخ user_id')
        })
    }

    async function quickReset(userId, phone, name) {
      if (!confirm(`إعادة كلمة مرور ${name} إلى ${phone}؟`)) return
      if (!phone || phone.length < 6) { showToast('⚠️ كلمة المرور أقل من 6 أحرف', true); return }

      const res = await fetch(`${SUPABASE_URL}/auth/v1/admin/users/${userId}`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SERVICE_KEY,
          'Authorization': `Bearer ${SERVICE_KEY}`
        },
        body: JSON.stringify({ password: phone })
      })
      const json = await res.json()
      if (!res.ok) { showToast('خطأ: '+(json.message||json.msg||'فشل'), true); return }
      showToast(`✅ ${name} — كلمة المرور: ${phone}`)
    }
  </script>
</body>
</html>
